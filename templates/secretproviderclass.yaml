{{- if .Values.secretProvider.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .Values.secretProvider.name }}
  namespace: {{ .Values.hyperfleet-sentinel.targetNamespace }}
spec:
  provider: aws
  parameters:
    {{- if .Values.secretProvider.aws.region }}
    region: {{ .Values.secretProvider.aws.region }}
    {{- end }}
    objects: |
      {{- range .Values.secretProvider.aws.secrets }}
      - objectName: {{ .objectName | quote }}
        objectType: {{ .objectType | default "secretsmanager" | quote }}
        {{- if .objectAlias }}
        objectAlias: {{ .objectAlias | quote }}
        {{- end }}
        {{- if .jmesPath }}
        jmesPath:
          {{- range .jmesPath }}
          - path: {{ .path | quote }}
            objectAlias: {{ .objectAlias | quote }}
          {{- end }}
        {{- end }}
      {{- end }}
  {{- if .Values.secretProvider.secretObjects }}
  secretObjects:
    {{- range .Values.secretProvider.secretObjects }}
    - secretName: {{ .secretName }}
      type: {{ .type | default "Opaque" }}
      data:
        {{- range .data }}
        - objectName: {{ .objectName | quote }}
          key: {{ .key | quote }}
        {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
