apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.hyperfleet-sentinel.applicationName }}
  namespace: {{ .Values.hyperfleet-sentinel.namespace }}
spec:
  project: {{ .Values.hyperfleet-sentinel.project }}

  source:
    repoURL: {{ .Values.hyperfleet-sentinel.source.repoURL }}
    targetRevision: {{ .Values.hyperfleet-sentinel.source.targetRevision }}
    path: {{ .Values.hyperfleet-sentinel.source.path }}
    {{- if .Values.hyperfleet-sentinel.values }}
    helm:
      valuesObject:
        {{- toYaml .Values.hyperfleet-sentinel.values | nindent 8 }}
    {{- end }}

  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.hyperfleet-sentinel.targetNamespace }}

  syncPolicy:
    {{- if .Values.hyperfleet-sentinel.syncPolicy.automated }}
    automated:
      prune: {{ .Values.hyperfleet-sentinel.syncPolicy.automated.prune }}
      selfHeal: {{ .Values.hyperfleet-sentinel.syncPolicy.automated.selfHeal }}
    {{- end }}
    {{- if .Values.hyperfleet-sentinel.syncPolicy.syncOptions }}
    syncOptions:
      {{- range .Values.hyperfleet-sentinel.syncPolicy.syncOptions }}
      - {{ . }}
      {{- end }}
    {{- end }}
